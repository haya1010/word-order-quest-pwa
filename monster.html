<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="0; url=index.html" />
  <title>Word Order Quest</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f8;
      color: #172033;
    }

    .box {
      width: min(520px, calc(100% - 28px));
      padding: 22px;
      display: grid;
      gap: 12px;
      background: #fff;
      border: 1px solid #d9e0ea;
      border-radius: 8px;
      box-shadow: 0 18px 44px rgba(23, 32, 51, 0.12);
    }

    h1 {
      margin: 0;
      font-size: 24px;
    }

    p {
      margin: 0;
      color: #687386;
      line-height: 1.6;
    }

    a {
      display: inline-grid;
      place-items: center;
      min-height: 42px;
      padding: 8px 12px;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main class="box">
    <h1>Word Order Quest</h1>
    <p>モンスターはアプリ本体に統合済みです。ホーム画面へ移動します。</p>
    <a href="index.html">ホーム画面を開く</a>
  </main>
</body>
</html>
